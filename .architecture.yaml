# Generated by HexaGen Configurator.
# Single source of truth — governs architecture, code generation, linting, and self-regeneration.
# Do not delete. Run `yarn sync` after edits to regenerate workspace structure.

system: hexagen-monaco
scope: hexagen
architecture: modular-monolith

monorepo:
  packageManager: yarn@4.12.0
  linker: node-modules
  buildTool: turbo
  workspaces: ['apps/*', 'packages/*'] # legacy 'tools/*' removed
  root:
    hoistDevDependencies: true
    noInternalDeps: true
  eslint:
    extends: ['turbo', 'prettier']
    rules:
      no-console: warn
      '@typescript-eslint/no-explicit-any': error
      no-restricted-imports:
        patterns:
          - group: ['@hexagen/*']
            message: 'Cross-package imports must go through barrel files (@hexagen/<module>). Deep imports only allowed from shared.'
  tsConfigRootFile: tsconfig.base.json
  tsConfigRoot:
    compilerOptions:
      target: es2022
      lib: [es2022, dom, dom.iterable]
      module: esnext
      moduleResolution: bundler
      strict: true
      esModuleInterop: true
      skipLibCheck: true
      forceConsistentCasingInFileNames: true
      composite: true
      baseUrl: .
      resolveJsonModule: true
      isolatedModules: true
      jsx: preserve
      declaration: true
      emitDeclarationOnly: true
      paths:
        '@hexagen/*': ['packages/*/src/index.ts']
        '@hexagen/shared': ['packages/shared/src/index.ts']
        '@hexagen/shared/*': ['packages/shared/src/*']
        '@/*': ['apps/web/src/*', 'apps/web/app/*']
    include: []
    exclude: [node_modules, dist, .next, .turbo]

  workspaceDefaults:
    tsConfig:
      extends: '../../tsconfig.base.json'
      compilerOptions:
        rootDir: src
        outDir: dist
        declaration: true
        emitDeclarationOnly: true
        declarationMap: true
    scripts:
      typecheck: 'tsc --noEmit'
      build: 'tsc --build'
      lint: 'eslint src --ext .ts,.tsx --max-warnings 0'
      test: 'jest --passWithNoTests'
    barrelGeneration:
      enabled: true
      exportStrategy: named
      barrelFile: index.ts
      layerBarrels: true

  turboConfig:
    globalDependencies:
      - '**/.env.*'
    pipeline:
      build:
        dependsOn: ['^build']
        outputs: ['dist/**', '.next/**', '!.next/cache/**']
      lint:
        dependsOn: ['^build']
      test:
        dependsOn: ['^build']
      dev:
        cache: false
        persistent: true
      typecheck:
        outputs: []
        cache: true

generator:
  version: '0.2.0'
  sync:
    idempotent: true
    createOnlyIfMissing: true
    layers:
      domain:
        folder: domain
      application:
        folder: application
        subfolders:
          - use-cases
          - ports/in
          - ports/out
      infrastructure:
        folder: infrastructure
        subfolders:
          - adapters
    barrels:
      autoGenerate: true
      perLayer: true
      reexportStyle: named
      includeGlobs:
        - domain/**/*.ts
        - application/use-cases/**/*.ts
        - application/ports/**/*.ts
        - infrastructure/**/*.ts
    stubs:
      enabled: true
      ports: true
      entities: true
      use-cases: true
    packageJson:
      private: true
      version: '0.1.0'
      license: MIT
      scripts:
        build: tsc --build
        lint: eslint src --ext .ts,.tsx
        typecheck: tsc --noEmit
      baseDependencies: {}
      baseDevDependencies:
        typescript: ^5.5.4
        '@typescript-eslint/eslint-plugin': ^8.0.0
        '@typescript-eslint/parser': ^8.0.0
        eslint: ^9.0.0
        eslint-config-prettier: ^9.1.0
    tsconfig:
      compilerOptions:
        strict: true
        module: esnext
        target: es2022
        moduleResolution: bundler
        esModuleInterop: true
        skipLibCheck: true
        composite: true
        declaration: true
        declarationMap: true
        emitDeclarationOnly: true

bounded_contexts: [] # TODO: populate with real bounded contexts

apps:
  - name: web
    driver: next.js
    description: Frontend application — wizard, monaco editor, agentic UI, visualization canvas
    depends_on:
      - shared
      - project-configuration
      - wizard-orchestration
      - monaco-orchestration
      - visualization
  - name: api-gateway
    driver: fastify
    description: Public HTTP API + command gateway (future phase)
    depends_on:
      - project-configuration
      - messaging
      - shared

modules:
  - name: project-configuration
    description: Governance core — manifest parsing, validation, project topology
    entities:
      - ProjectSpec
      - BoundedContext
      - Entity
      - ValueObject
      - Port
      - UseCase
      - Adapter
      - Driver
    value_objects:
      - FileTreeNode
    use_cases:
      - GenerateProject
      - ValidateSpec
      - RenderManifest
    ports:
      out:
        - ProjectGeneratorPort
        - DownloadProviderPort
    generator:
      dependencies:
        js-yaml: ^4.1.0
        zod: ^3.23.8

  - name: shared
    description: Shared primitives, custom errors, base classes, utilities

  - name: messaging
    description: Domain events, intent bus, pluggable transports

  - name: wizard-orchestration
    description: Deterministic wizard flows, intent processing, state projections
    entities:
      - WizardSession
    value_objects:
      - WizardStep
      - IntentPayload
      - ProjectionViewModel
    use_cases:
      - ProcessIntent
      - ProjectWizardState
      - ValidateStep
    ports:
      out:
        - WizardPersistencePort
        - WizardTelemetryPort
        - IntentBusPort
        - MonacoSyncPort

  - name: monaco-orchestration
    description: Semantic code editing with patch-based mutations, confidence gating, undo
    entities:
      - MonacoSession
    value_objects:
      - SemanticPatch
      - ConfidenceScore
      - PatchIntentMetadata
    use_cases:
      - ApplySemanticPatch
      - ValidatePatchIntent
      - UndoLastPatch
      - ProjectCurrentBufferState
    ports:
      out:
        - MonacoPersistencePort
        - SemanticModelAdapterPort
        - PatchApplicationPort
    generator:
      dependencies:
        monaco-editor: ^0.51.0
        ts-morph: ^22.0.0

  - name: visualization
    description: Interactive architecture graph, module dependency view, DDD canvas
    value_objects:
      - GraphLayoutOptions
      - NodeVisualStyle
    use_cases:
      - GenerateArchitectureGraph
      - RenderGraphProjection
      - ExportGraphImage
    ports:
      out:
        - ArchitectureGraphProviderPort
    generator:
      dependencies:
        reactflow: ^11.11.4
        '@dagrejs/dagre': ^1.1.4

  - name: code-generation
    description: Manifest-to-code compiler, template engine, self-dogfooding generator

  - name: architectural-enforcement
    description: Dependency rules, boundary checks, circular dependency detection, arch-linter core

  - name: persistence
    description: Architecture snapshots, manifest versioning, change history, evolution ledger

  - name: agentic-interaction
    description: AI assistant integration — ports for LLM providers (Grok/xAI), suggestion engine

  - name: deployment
    description: Self-dogfooding loop — WebContainer previews, GitHub Actions, live regeneration

drivers:
  web: next.js
  api-gateway: fastify
