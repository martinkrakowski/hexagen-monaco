# Generated by HexaGen Configurator.
# Single source of truth — governs architecture, code generation, linting, and self-regeneration.
# Do not delete. Run `yarn sync` after edits to regenerate workspace structure.

system: hexagen-monaco
scope: hexagen
architecture: modular-monolith

monorepo:
  packageManager: yarn@4.12.0
  linker: node-modules
  buildTool: turbo
  workspaces: ['apps/*', 'packages/*']
  root:
    hoistDevDependencies: true
    noInternalDeps: true
  eslint:
    extends: ['turbo', 'prettier']
    rules:
      no-console: warn
      '@typescript-eslint/no-explicit-any': error
      no-restricted-imports:
        patterns:
          - group: ['@hexagen/*']
            message: 'Cross-package imports must go through barrel files (@hexagen/<module>). Deep imports only allowed from shared.'
  tsConfigRootFile: tsconfig.base.json
  tsConfigRoot:
    compilerOptions:
      target: es2022
      lib: [es2022, dom, dom.iterable]
      module: esnext
      moduleResolution: bundler
      strict: true
      esModuleInterop: true
      skipLibCheck: true
      forceConsistentCasingInFileNames: true
      composite: true
      baseUrl: .
      resolveJsonModule: true
      isolatedModules: true
      jsx: preserve
      declaration: true
      emitDeclarationOnly: true
      paths:
        '@hexagen/*': ['packages/*/src/index.ts']
        '@hexagen/shared': ['packages/shared/src/index.ts']
        '@hexagen/shared/*': ['packages/shared/src/*']
        '@/*': ['apps/web/src/*', 'apps/web/app/*']
    include: []
    exclude: [node_modules, dist, .next, .turbo]

  workspaceDefaults:
    tsConfig:
      extends: '../../tsconfig.base.json'
      compilerOptions:
        rootDir: src
        outDir: dist
        declaration: true
        emitDeclarationOnly: true
        declarationMap: true
        composite: true
        tsBuildInfoFile: './dist/.tsbuildinfo'
      include: ['src/**/*']
      exclude: ['node_modules', 'dist', '.turbo']
      references: [] # Generator populates from depends_on

  turboConfig:
    globalDependencies:
      - '**/.env.*'
    pipeline:
      clean:
        cache: false
      build:
        dependsOn: ['^build']
        outputs: ['dist/**', '.next/**', '!.next/cache/**']
      lint:
        dependsOn: ['^build']
      test:
        dependsOn: ['^build']
      dev:
        cache: false
        persistent: true
      typecheck:
        outputs: []
        cache: true

generator:
  version: '0.2.0'
  sync:
    idempotent: true
    createOnlyIfMissing: true
    nonDestructive: true # Enforced skip on existing files unless --force
    layers:
      domain:
        folder: domain
      application:
        folder: application
        subfolders:
          - use-cases
          - ports/in
          - ports/out
      infrastructure:
        folder: infrastructure
        subfolders:
          - adapters
    barrels:
      autoGenerate: true
      perLayer: true
      reexportStyle: named
      includeGlobs:
        - domain/**/*.ts
        - application/use-cases/**/*.ts
        - application/ports/**/*.ts
        - infrastructure/**/*.ts
    stubs:
      enabled: true
      ports: true
      entities: true
      use-cases: true
    packageJson:
      private: true
      version: '0.1.0'
      license: MIT
      scripts:
        build: tsc --build
        lint: eslint src --ext .ts,.tsx
        typecheck: tsc --noEmit
      baseDependencies: {}
      baseDevDependencies:
        typescript: ^5.5.4
        '@typescript-eslint/eslint-plugin': ^8.0.0
        '@typescript-eslint/parser': ^8.0.0
        eslint: ^9.0.0
        eslint-config-prettier: ^9.1.0
    tsconfig:
      compilerOptions:
        strict: true
        module: esnext
        target: es2022
        moduleResolution: bundler
        esModuleInterop: true
        skipLibCheck: true
        composite: true
        declaration: true
        declarationMap: true
        emitDeclarationOnly: true

bounded_contexts:
  - name: shared
    type: shared-kernel
    description: Shared primitives, custom errors, base classes, utilities
    layers:
      domain:
        value_objects: [CustomError, Identifier]

  - name: project-configuration
    type: core
    description: Governance core — manifest parsing, validation, project topology
    layers:
      domain:
        entities:
          [
            ProjectSpec,
            BoundedContext,
            Entity,
            ValueObject,
            Port,
            UseCase,
            Adapter,
            Driver,
          ]
        value_objects: [] # FileTreeNode removed — use Project entity projections instead
      application:
        use_cases:
          [GenerateProjectUseCase, ValidateSpecUseCase, RenderManifestUseCase]
        ports:
          out: [ProjectGeneratorPort, DownloadProviderPort]
      infrastructure:
        adapters: [] # To be populated (e.g. YamlParserAdapter)
    generator:
      dependencies:
        js-yaml: ^4.1.0
        zod: ^3.23.8

  - name: sync
    type: core
    description: SyncEngine — idempotent regeneration, structured reporting, aggregation of generator results
    layers:
      domain:
        entities: [GeneratorResult, SyncReport]
      application:
        use_cases: [RunSyncUseCase, AggregateGeneratorResultsUseCase]
        ports:
          in: [GeneratorPort] # Implemented by layer generators
      infrastructure:
        adapters: [FileSystemGeneratorAdapter, ArchLinterAdapter]

  - name: wizard-orchestration
    type: core
    description: Deterministic wizard flows, intent processing, state projections
    layers:
      domain:
        entities: [WizardSession]
        value_objects: [WizardStep, IntentPayload, ProjectionViewModel]
      application:
        use_cases:
          [ProcessIntentUseCase, ProjectWizardStateUseCase, ValidateStepUseCase]
        ports:
          out:
            [
              WizardPersistencePort,
              WizardTelemetryPort,
              IntentBusPort,
              MonacoSyncPort,
            ]

  - name: monaco-orchestration
    type: core
    description: Semantic code editing with patch-based mutations, confidence gating, undo
    layers:
      domain:
        entities: [MonacoSession]
        value_objects: [SemanticPatch, ConfidenceScore, PatchIntentMetadata]
      application:
        use_cases:
          [
            ApplySemanticPatchUseCase,
            ValidatePatchIntentUseCase,
            UndoLastPatchUseCase,
            ProjectCurrentBufferStateUseCase,
          ]
        ports:
          out:
            [
              MonacoPersistencePort,
              SemanticModelAdapterPort,
              PatchApplicationPort,
            ]
    generator:
      dependencies:
        monaco-editor: ^0.51.0
        ts-morph: ^22.0.0

  - name: visualization
    type: supporting
    description: Interactive architecture graph, module dependency view, DDD canvas
    layers:
      domain:
        value_objects: [GraphLayoutOptions, NodeVisualStyle]
      application:
        use_cases:
          [
            GenerateArchitectureGraphUseCase,
            RenderGraphProjectionUseCase,
            ExportGraphImageUseCase,
          ]
        ports:
          out: [ArchitectureGraphProviderPort]
    generator:
      dependencies:
        reactflow: ^11.11.4
        '@dagrejs/dagre': ^1.1.4

  - name: messaging
    type: supporting
    description: Domain events, intent bus, pluggable transports
    layers:
      domain:
        value_objects: [DomainEvent, Intent]
      application:
        ports:
          out: [EventBusPort, IntentBusPort]

  - name: persistence
    type: supporting
    description: Architecture snapshots, manifest versioning, change history, evolution ledger
    layers:
      domain:
        entities: [Snapshot, Version]
      infrastructure:
        adapters: [] # e.g. FileSystemSnapshotAdapter, GitLedgerAdapter

  - name: agentic-interaction
    type: supporting
    description: AI assistant integration — ports for LLM providers (Grok/xAI), suggestion engine
    layers:
      domain:
        value_objects: [Suggestion, ConfidenceScore]
      application:
        ports:
          out: [LLMProviderPort, SuggestionEnginePort]

  - name: web-driver
    type: driver
    description: Next.js frontend — Intent Bus, projections, Monaco wrapper, agentic UI
    layers:
      domain:
        entities: [Project, MonacoSessionState]
        ports:
          out: [MonacoPersistencePort, DownloadProjectPort]
      application:
        use_cases:
          [
            ProjectViewProjectionUseCase,
            PersistSessionIntentHandler,
            DownloadProjectUseCase,
          ]
        factories: [createWebUseCaseFactories]
      infrastructure:
        adapters: [LocalStoragePersistenceAdapter, WebContainerPreviewAdapter]
    driver_for: apps/web
    wiring:
      - Intent Bus dispatches to projections/use-case factories only

apps:
  - name: web
    driver: next.js
    description: Frontend application — wizard, monaco editor, agentic UI, visualization canvas
    depends_on:
      - shared
      - project-configuration
      - wizard-orchestration
      - monaco-orchestration
      - visualization
      - sync
  - name: api-gateway
    driver: fastify
    description: Public HTTP API + command gateway (future phase)
    depends_on:
      - project-configuration
      - messaging
      - shared
