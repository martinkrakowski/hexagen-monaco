# Generated by HexaGen Configurator.
# This file is a manifest of the system and its modules.
# Do not delete; used for architectural linting and syncing.

system: hexagen-monaco
scope: 'hexagen'
architecture: modular-monolith

monorepo:
  packageManager: yarn@4.12.0
  linker: node-modules
  buildTool: turbo
  workspaces: ['apps/*', 'packages/*', 'tools/*']
  root:
    hoistDevDependencies: true
    noInternalDeps: true
  eslint:
    extends: ['turbo', 'prettier']
    rules:
      no-console: warn
      '@typescript-eslint/no-explicit-any': error
      no-restricted-imports:
        patterns:
          - group: ['@hexagen/*']
            message: 'Cross-package imports must be done via the barrel file. Only deep imports from `shared` are allowed.'

apps:
  - name: api-gateway
    driver: fastify
    description: 'Public HTTP API + command gateway'
    depends_on:
      - project-configuration
      - messaging
      - shared

  - name: web
    driver: next.js
    description: 'Frontend application (wizard + editor)'
    depends_on:
      - shared
      - project-configuration

modules:
  - name: project-configuration
    description: 'Primary feature module for ProjectConfiguration'
    entities:
      - ProjectSpec
      - BoundedContext
      - Entity
      - ValueObject
      - Port
      - UseCase
      - Adapter
      - Driver
    use_cases:
      - GenerateProject
      - ValidateSpec
      - RenderManifest
    infrastructure:
      - persistence: drizzle
      - messaging: bull-mq
      - telemetry: open-telemetry
      - llm_providers:
          - Grok
      - external_apis:
          - drizzle
          - bull-mq
          - open-telemetry
          - grok
          - ai-provider-port
          - git-provider-port
          - preview-provider-port
      - ports: # New array for entity-specific repository ports
          - adapter-repository
          - bounded-context-repository
          - driver-repository
          - entity-repository
          - port-repository
          - project-spec-repository
          - use-case-repository
          - value-object-repository

  - name: shared
    description: 'Shared types, errors, and base classes for all modules.'

  - name: messaging
    description: 'Handles cross-module communication via message queues.'

drivers:
  api-gateway: fastify
  web: next.js
