# Generated by HexaGen Configurator.
# This file is a manifest of the system and its modules.
# Do not delete; used for architectural linting and syncing.

system: hexagen-monaco
scope: 'hexagen'
architecture: modular-monolith

monorepo:
  packageManager: yarn@4.12.0
  linker: node-modules
  buildTool: turbo
  workspaces: ['apps/*', 'packages/*', 'tools/*']
  root:
    hoistDevDependencies: true
    noInternalDeps: true
  eslint:
    extends: ['turbo', 'prettier']
    rules:
      no-console: warn
      '@typescript-eslint/no-explicit-any': error
      no-restricted-imports:
        patterns:
          - group: ['@hexagen/*']
            message: 'Cross-package imports must be done via the barrel file. Only deep imports from `shared` are allowed.'
  tsConfigRootFile: tsconfig.base.json
  tsConfigRoot:
    compilerOptions:
      target: es2021
      lib: [es2021, dom, dom.iterable]
      module: esnext
      moduleResolution: bundler
      strict: true
      esModuleInterop: true
      skipLibCheck: true
      forceConsistentCasingInFileNames: true
      composite: true
      baseUrl: .
      resolveJsonModule: true
      isolatedModules: true
      jsx: preserve
      declaration: true
      emitDeclarationOnly: true
      paths:
        '@hexagen/project-configuration':
          ['packages/project-configuration/src/index.ts']
        '@hexagen/project-configuration/*':
          ['packages/project-configuration/src/*']
        '@hexagen/shared': ['packages/shared/src/index.ts']
        '@hexagen/shared/*': ['packages/shared/src/*']
        '@hexagen/messaging': ['packages/messaging/src/index.ts']
        '@hexagen/messaging/*': ['packages/messaging/src/*']
        '@hexagen/*': ['packages/*/src']
        '@/*': ['apps/web/src/*']
    include: []
    exclude: [node_modules, dist, .next]
  workspaceDefaults:
    tsConfig:
      extends: '../../tsconfig.base.json'
      compilerOptions:
        rootDir: ./src
        outDir: ./dist
        declaration: true
        emitDeclarationOnly: true
    scripts:
      typecheck: 'tsc --noEmit'
      build: 'tsc --build'
      lint: 'eslint . --ext .ts,.tsx'
      test: 'jest'
  turboConfig:
    globalDependencies:
      - '**/.env.*'
    pipeline:
      build:
        dependsOn: ['^build']
        outputs: ['dist/**', '.next/**', '!.next/cache/**']
      lint:
        dependsOn: ['^build']
      test:
        dependsOn: ['^build']
      dev:
        cache: false
        persistent: true
      typecheck:
        outputs: []
        cache: true

apps:
  - name: api-gateway
    driver: fastify
    description: 'Public HTTP API + command gateway'
    depends_on:
      - project-configuration
      - messaging
      - shared
    tsConfig:
      compilerOptions:
        rootDir: '.'
        noEmit: true
      include: ['app.js', 'routes/**/*.js', '**/*.ts']
      exclude: ['node_modules', 'dist']

  - name: web
    driver: next.js
    description: 'Frontend application (wizard + editor)'
    depends_on:
      - shared
      - project-configuration
      - wizard-orchestration
    tsConfig:
      compilerOptions:
        rootDir: '.' # Explicit to include root-level generated files
        jsx: 'preserve'
        incremental: true
        noEmit: true
      include: ['next-env.d.ts', '**/*.ts', '**/*.tsx', '.next/types/**/*.ts']
      exclude: ['node_modules', '.next']

modules:
  - name: project-configuration
    description: 'Primary feature module for ProjectConfiguration'
    entities:
      - ProjectSpec
      - BoundedContext
      - Entity
      - ValueObject
      - Port
      - UseCase
      - Adapter
      - Driver
    value_objects:
      - FileTreeNode
    use_cases:
      - GenerateProject
      - ValidateSpec
      - RenderManifest
    ports:
      - ProjectGeneratorPort
      - DownloadProviderPort
    infrastructure:
      - persistence: drizzle
      - messaging: bull-mq
      - telemetry: open-telemetry
      - llm_providers:
          - Grok
      - external_apis:
          - drizzle
          - bull-mq
          - open-telemetry
          - grok
          - ai-provider-port
          - git-provider-port
          - preview-provider-port
          - jszip
      - ports:
          - adapter-repository
          - bounded-context-repository
          - driver-repository
          - entity-repository
          - port-repository
          - project-spec-repository
          - use-case-repository
          - value-object-repository

  - name: shared
    description: 'Shared types, errors, and base classes for all modules.'

  - name: messaging
    description: 'Handles cross-module communication via message queues.'

  - name: wizard-orchestration
    description: 'Orchestrates wizard sessions, intents, and projections for agentic UI'
    entities:
      - WizardSession
    value_objects:
      - WizardStep
      - IntentPayload
      - ProjectionViewModel
    use_cases:
      - ProcessIntent
      - ProjectWizardState
      - ValidateStep
    ports:
      - WizardPersistencePort
      - WizardTelemetryPort
      - IntentBusPort
      - MonacoSyncPort
    infrastructure:
      - persistence: local-storage
      - telemetry: open-telemetry
      - messaging: intent-bus
      - external_apis:
          - monaco-editor

drivers:
  api-gateway: fastify
  web: next.js
